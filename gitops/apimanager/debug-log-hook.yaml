# PostSync hook — habilita logs de debug para backend-listener e system-app.
#
# O APIManager operator não expõe campos de log level para esses componentes;
# este hook aplica as variáveis diretamente nos recursos gerenciados pelo operador
# e reinicia os pods. É executado após cada sync do Application '3scale-apimanager'.
#
# Componentes afetados:
#   backend-listener  → CONFIG_LOG_LEVEL=debug  (apisonator/Sinatra)
#   backend-worker    → CONFIG_LOG_LEVEL=debug  (apisonator worker)
#   system-environment CM → RAILS_LOG_LEVEL=debug (system-app + sidekiq)
#
# Para desabilitar os logs de debug: altere os valores para "info" e force um sync.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: debug-log-patch
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: debug-log-patch
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: debug-log-patch
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
subjects:
  - kind: ServiceAccount
    name: debug-log-patch
    namespace: 3scale-gitops
roleRef:
  kind: Role
  name: debug-log-patch
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: debug-log-patch
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: debug-log-patch
      restartPolicy: OnFailure
      containers:
        - name: patch
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e

              LOG_LEVEL="${DEBUG_LOG_LEVEL:-debug}"

              echo "=== Patching backend-listener: CONFIG_LOG_LEVEL=${LOG_LEVEL} ==="
              oc -n 3scale-gitops patch deployment/backend-listener --type=json \
                -p "[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/env/-\",\"value\":{\"name\":\"CONFIG_LOG_LEVEL\",\"value\":\"${LOG_LEVEL}\"}}]" \
                2>/dev/null || \
              oc -n 3scale-gitops patch deployment/backend-listener --type=json \
                -p "[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/env/$(oc -n 3scale-gitops get deployment/backend-listener -o json | python3 -c \"import sys,json; envs=json.load(sys.stdin)['spec']['template']['spec']['containers'][0]['env']; print(next((i for i,e in enumerate(envs) if e['name']=='CONFIG_LOG_LEVEL'), len(envs)))\"))\",\"value\":{\"name\":\"CONFIG_LOG_LEVEL\",\"value\":\"${LOG_LEVEL}\"}}]"

              echo "=== Patching backend-worker: CONFIG_LOG_LEVEL=${LOG_LEVEL} ==="
              oc -n 3scale-gitops patch deployment/backend-worker --type=json \
                -p "[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/env/-\",\"value\":{\"name\":\"CONFIG_LOG_LEVEL\",\"value\":\"${LOG_LEVEL}\"}}]" \
                2>/dev/null || true

              echo "=== Patching system-environment CM: RAILS_LOG_LEVEL=${LOG_LEVEL} ==="
              oc -n 3scale-gitops patch configmap/system-environment --type=json \
                -p "[{\"op\":\"replace\",\"path\":\"/data/RAILS_LOG_LEVEL\",\"value\":\"${LOG_LEVEL}\"}]"

              echo "=== Reiniciando pods afetados ==="
              oc -n 3scale-gitops rollout restart \
                deployment/backend-listener \
                deployment/backend-worker \
                deployment/system-app \
                deployment/system-sidekiq

              echo "=== Aguardando rollout backend-listener ==="
              oc -n 3scale-gitops rollout status deployment/backend-listener --timeout=120s

              echo "Done. Log level=${LOG_LEVEL} aplicado."
          env:
            - name: DEBUG_LOG_LEVEL
              value: "debug"
