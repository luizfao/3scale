# Red Hat 3scale API Management 2.16 - APIManager CR
# Set spec.wildcardDomain to your OpenShift apps domain (e.g. apps.cluster-xxx.dynamic.redhatworkshops.io)
# See: https://docs.redhat.com/en/documentation/red_hat_3scale_api_management/2.16/html-single/installing_red_hat_3scale_api_management/
apiVersion: apps.3scale.net/v1alpha1
kind: APIManager
metadata:
  name: apimanager
  namespace: 3scale-gitops
  annotations:
    # APIManager CRD is created by the 3scale operator; use a later wave so operator can be installed (and Install Plan approved) first
    argocd.argoproj.io/sync-wave: "5"
spec:
  wildcardDomain: apps.cluster-zrdcz.dynamic.redhatworkshops.io
  # 2.16 requires external System DB + Redis; Zync DB is kept internal (operator-managed).
  externalComponents:
    backend:
      redis: true
    system:
      database: true
      redis: true
    # Zync database can be internal
    # zync:
    #   database: true
  # Ceph RBD does not support RWX; use CephFS for system file storage (Developer Portal / assets).
  system:
    fileStorage:
      persistentVolumeClaim:
        storageClassName: ocs-external-storagecluster-cephfs
  # Optional: explicit replicas (defaults are fine for lab)
  # system:
  #   appSpec:
  #     replicas: 1
  #   sidekiqSpec:
  #     replicas: 1
  # apicast:
  #   productionSpec:
  #     replicas: 1
  #   stagingSpec:
  #     replicas: 1
