# PostSync Job — popula automaticamente a Secret apicast-ha-portal-credentials
#
# Executa após cada sync do Application '3scale-apimanager' (ArgoCD PostSync hook).
# Lê o ADMIN_ACCESS_TOKEN da Secret 'system-seed' (criada pelo operador 3scale durante
# a instalação do APIManager) e obtém o hostname do Admin Portal via label do Route,
# depois cria ou atualiza a Secret 'apicast-ha-portal-credentials' usada pelos APIcast CRs.
#
# O Job é deletado automaticamente após sucesso (HookSucceeded).
# Em caso de falha, permanece para inspeção dos logs:
#   oc -n 3scale-gitops logs job/apicast-portal-secret-init
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apicast-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apicast-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["system-seed"]
    verbs: ["get"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["apicast-ha-portal-credentials"]
    verbs: ["get", "create", "patch", "update"]
  # create precisa de permissão no recurso sem resourceNames
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apicast-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apicast-secret-init
subjects:
  - kind: ServiceAccount
    name: apicast-secret-init
    namespace: 3scale-gitops
---
apiVersion: batch/v1
kind: Job
metadata:
  name: apicast-portal-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: apicast-secret-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              TOKEN=$(oc -n 3scale-gitops get secret system-seed \
                -o jsonpath='{.data.ADMIN_ACCESS_TOKEN}' | base64 -d)
              HOST=$(oc -n 3scale-gitops get route \
                -l zync.3scale.net/route-to=system-provider \
                -o jsonpath='{.items[0].spec.host}')
              if [ -z "${TOKEN}" ] || [ -z "${HOST}" ]; then
                echo "ERROR: could not read TOKEN or HOST from cluster"
                exit 1
              fi
              echo "Updating apicast-ha-portal-credentials for host: ${HOST}"
              oc -n 3scale-gitops create secret generic apicast-ha-portal-credentials \
                --from-literal=AdminPortalURL="https://${TOKEN}@${HOST}" \
                --dry-run=client -o yaml | oc apply -f -
              echo "Done."
