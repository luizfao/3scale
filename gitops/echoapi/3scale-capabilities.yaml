apiVersion: v1
kind: Secret
metadata:
  name: echoapi-developer-password
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  password: change-me
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Backend
metadata:
  name: echoapi-backend
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  name: Echo API Backend
  systemName: echoapi_backend
  privateBaseURL: http://echoapi.echoapi-gitops.svc.cluster.local:9292
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Product
metadata:
  name: echoapi-product
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  name: Echo API
  systemName: echoapi
  deployment:
    apicastHosted: {}
  backendUsages:
    echoapi_backend:
      path: /
  mappingRules:
    - httpMethod: GET
      pattern: /
      increment: 1
      metricMethodRef: hits
  applicationPlans:
    basic:
      name: Basic
  policies:
# #TODO: update userkey
#     - configuration:
#         auth_type: "user_key"
#         user_key: "change-me-user-key"
#       enabled: true
#       name: default_credentials
#       version: builtin
# # TODO: update clientid, secret and url
#     - configuration:
#         auth_type: client_id+client_secret
#         client_id: "1bcd267b" 
#         client_secret: "b5d07a86b99cc22c1ededac1b04a1774"
#         introspection_url: "https://rhbk-rhbk-gitops.apps.cluster-zrdcz.dynamic.redhatworkshops.io/auth/realms/rhbk/protocol/openid-connect/token/introspect"
#         max_ttl_tokens: 60
#         max_cached_tokens: 100
#       enabled: true
#       name: token_introspection
#       version: builtin
    - configuration: {}
      name: apicast
      version: builtin
      enabled: true
---
apiVersion: capabilities.3scale.net/v1beta1
kind: DeveloperAccount
metadata:
  name: echoapi-account
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  orgName: Echo API Org
---
apiVersion: capabilities.3scale.net/v1beta1
kind: DeveloperUser
metadata:
  name: echoapi-developer
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  username: echoapi-user
  email: echoapi-user@example.org
  passwordCredentialsRef:
    name: echoapi-developer-password
    namespace: 3scale-gitops
  role: admin
  developerAccountRef:
    name: echoapi-account
---
apiVersion: capabilities.3scale.net/v1beta1
kind: Application
metadata:
  name: echoapi-application-v2
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  name: Echo API App v2
  description: Echo API test application
  accountCR:
    name: echoapi-account
  productCR:
    name: echoapi-product
  applicationPlanName: basic
---
# Pre-defined UserKey for echoapi-product (user_key authentication).
# Update 'change-me-user-key' to the desired key value (min 5 characters) before syncing.
# After ApplicationAuth runs successfully, this secret will also contain the ApplicationID.
apiVersion: v1
kind: Secret
metadata:
  name: echoapi-product-appauth
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "7"
type: Opaque
stringData:
  UserKey: "change-me-user-key"
---
# ApplicationAuth is a one-off action: once Ready, the operator will not re-apply it.
# It sets the UserKey on echoapi-application-v2 using the value from the secret above.
apiVersion: capabilities.3scale.net/v1beta1
kind: ApplicationAuth
metadata:
  name: echoapi-product-appauth
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  applicationCRName: echoapi-application-v2
  generateSecret: false
  authSecretRef:
    name: echoapi-product-appauth
---
