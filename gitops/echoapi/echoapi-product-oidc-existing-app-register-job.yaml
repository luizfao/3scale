# Job: cria a Application 3scale (OIDC) com client_id e client_secret já definidos via Account Management API.
#
# O CRD Application do operador não suporta application_id / credenciais OAuth; o Porta expõe isso na API:
#   POST /admin/api/accounts/{account_id}/applications.json
#   parâmetros: access_token, plan_id, name, description, application_id, application_key[]
# Ver: 3scale Porta Admin::Api::BuyersApplicationsController#create
#
# O service (produto) NÃO vai no body do create: o plan_id já identifica o Application Plan e esse
# plano pertence a um único service. O PRODUCT_SYSTEM_NAME só serve para localizar service_id via
# GET /admin/api/services.json e listar planos em GET /admin/api/services/{service_id}/application_plans.json
# antes de obter o plan_id numérico usado no POST.
#
# Pré-requisitos:
#   - Product/Service e Application Plan já existem no 3scale (sync do Product CR).
#   - DeveloperAccount com org_name = ACCOUNT_ORG_NAME.
#   - Secret myapi-oidc-3scale-management com adminURL + token (access token com scope Account Management API).
#   - Secret myapi-oidc-existing-app-client com clientId + clientSecret (Keycloak existente).
#
# O Job é idempotente: se já existir aplicação com o mesmo application_id ou nome, valida se o
# client_secret no 3scale coincide com CLIENT_SECRET (Keycloak); se não coincidir, falha com erro.
# Após create, compara quando a API expõe o secret; caso contrário emite aviso e segue.
#
# A Application 3scale com application_id (client OIDC) e secret pré-definidos NÃO é criada por um
# CR Application (o operador não expõe esses campos). Aplique em paralelo:
#   echoapi-product-oidc-existing-app-register-job.yaml
# que usa a Account Management API (POST .../accounts/{id}/applications) com application_id e
# application_key[].
---
apiVersion: v1
kind: Secret
metadata:
  name: myapi-oidc-issuer
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "3"
type: Opaque
stringData:
  # Substitua pelo client_id e client_secret do client do 3scale zync; host e realm conforme o ambiente.
  issuerEndpoint: "https://3scale-zync:jpuYKK4yELQlAn1PrpBFFVVmHk0y48Xl@rhbk-rhbk-gitops.apps.cluster-zrdcz.dynamic.redhatworkshops.io/realms/rhbk" # notsecret - test data
---
apiVersion: v1
kind: Secret
metadata:
  name: myapi-oidc-3scale-management
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
type: Opaque
stringData:
  # secret do tenant
  adminURL: "https://3scale-admin.apps.cluster-bcb52.dynamic.redhatworkshops.io"
  token: "cWtX7IDeX234E2bF" # notsecret - test data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapi-oidc-register-application-script
  namespace: 3scale-gitops
data:
  register.py: |
    #!/usr/bin/env python3
    """
    Registra aplicação OIDC no 3scale com client_id e client_secret do Keycloak pré-definidos.
    """
    import json
    import os
    import secrets
    import sys
    import urllib.error
    import urllib.parse
    import urllib.request

    def die(msg, code=1):
        print(msg, file=sys.stderr)
        sys.exit(code)

    def getenv(name, default=None):
        v = os.environ.get(name, default)
        if not v:
            die(f"Variável de ambiente obrigatória ausente ou vazia: {name}")
        return v

    def api_request(admin_url, path, token, method="GET", payload=None):
        """
        Faz requisição HTTP para a API do 3scale e retorna (status_code, json_dict).
        """
        url = f"{admin_url}{path}"
        headers = {"Accept": "application/json"}
        data = None

        if method == "GET":
            query = urllib.parse.urlencode({"access_token": token})
            url = f"{url}?{query}"
        elif method == "POST":
            headers["Content-Type"] = "application/x-www-form-urlencoded"
            form_data = payload.copy() if payload else []
            form_data.append(("access_token", token))
            data = urllib.parse.urlencode(form_data).encode()

        req = urllib.request.Request(url, data=data, method=method, headers=headers)
        try:
            with urllib.request.urlopen(req, timeout=120) as response:
                body = response.read().decode()
                return response.status, (json.loads(body) if body else {})
        except urllib.error.HTTPError as e:
            raw = e.read().decode(errors="replace") if e.fp else ""
            try:
                parsed = json.loads(raw) if raw else None
            except json.JSONDecodeError:
                parsed = raw
            return e.code, parsed
        except Exception as e:
            die(f"Erro de conexão com a API do 3scale: {e}")

    def get_app_client_secret(app):
        """
        Lê client_secret do JSON de application da API (OIDC/OAuth).
        """
        cs = app.get("client_secret")
        if cs is not None and str(cs).strip() and str(cs).strip().upper() != "N/A":
            return str(cs)
        
        keys = app.get("keys", [])
        if isinstance(keys, list) and keys:
            el = keys[0]
            if isinstance(el, dict):
                v = el.get("key") or el.get("value")
                if v is not None and str(v).strip():
                    return str(v)
            elif isinstance(el, str) and el.strip():
                return el
        return None

    def validate_client_secret_matches_app(app, expected_secret, allow_missing=False):
        """
        Compara o secret já associado à aplicação no 3scale com o secret esperado.
        Se allow_missing e a API não expuser o secret, apenas avisa em stderr.
        """
        remote = get_app_client_secret(app)
        if remote is None:
            if allow_missing:
                print(
                    "Aviso: a API do 3scale não retornou client_secret nesta resposta; "
                    "a validação contra o secret esperado foi ignorada.",
                    file=sys.stderr,
                )
                return
            
            print(f"JSON da aplicação retornado pela API:\n{json.dumps(app, indent=2, ensure_ascii=False)}", file=sys.stderr)
            die(
                "Não foi possível obter client_secret da aplicação na resposta da API do 3scale; "
                "não é possível validar."
            )
            
        if not secrets.compare_digest(remote, str(expected_secret)):
            print(
                "Erro: o client_secret registrado no 3scale para esta aplicação "
                "é diferente do client_secret esperado (Keycloak / variável CLIENT_SECRET).",
                file=sys.stderr,
            )
            print(f"Secret esperado (Keycloak): {expected_secret!r}", file=sys.stderr)
            print(f"Secret remoto (3scale): {remote!r}", file=sys.stderr)
            print(f"JSON da aplicação retornado pela API:\n{json.dumps(app, indent=2, ensure_ascii=False)}", file=sys.stderr)
            die("Validação de client_secret falhou — os secrets não coincidem.", 2)

    def main():
        admin_url = getenv("ADMIN_URL").rstrip("/")
        token = getenv("ACCESS_TOKEN")
        org_name = getenv("ACCOUNT_ORG_NAME")
        product_sn = getenv("PRODUCT_SYSTEM_NAME")
        plan_sn = getenv("PLAN_SYSTEM_NAME")
        app_name = getenv("APP_NAME")
        app_desc = os.environ.get("APP_DESCRIPTION", "")
        client_id = getenv("CLIENT_ID")
        client_secret = getenv("CLIENT_SECRET")

        # 1. Buscar a conta do desenvolvedor
        status, accounts_resp = api_request(admin_url, "/admin/api/accounts.json", token)
        if status != 200:
            die(f"Erro ao buscar contas: HTTP {status} - {accounts_resp}")

        account = next((item["account"] for item in accounts_resp.get("accounts", [])
                        if item.get("account", {}).get("org_name") == org_name), None)
        if not account:
            die(f"Conta de desenvolvedor com org_name={org_name!r} não encontrada no 3scale")
        account_id = account["id"]

        # 2. Verificar se a aplicação já existe (evita chamadas desnecessárias)
        status, apps_resp = api_request(admin_url, f"/admin/api/accounts/{account_id}/applications.json", token)
        if status != 200:
            die(f"Erro ao buscar aplicações: HTTP {status} - {apps_resp}")

        for item in apps_resp.get("applications", []):
            app = item.get("application", {})
            aid = app.get("application_id")

            is_same_id = (aid is not None and str(aid) == str(client_id))
            is_same_name = (app.get("name") == app_name)

            if is_same_id or is_same_name:
                reason = f"application_id={aid}" if is_same_id else f"nome={app_name!r}"
                print(f"OK: aplicação já existe ({reason}, id={app.get('id')})", file=sys.stderr)
                validate_client_secret_matches_app(app, client_secret, allow_missing=False)
                print(json.dumps({"ja_existia": True, "aplicacao": app}, indent=2, ensure_ascii=False))
                sys.exit(0)

        # 3. Buscar o serviço (produto)
        status, services_resp = api_request(admin_url, "/admin/api/services.json", token)
        if status != 200:
            die(f"Erro ao buscar serviços: HTTP {status} - {services_resp}")

        service = next((item["service"] for item in services_resp.get("services", [])
                        if item.get("service", {}).get("system_name") == product_sn), None)
        if not service:
            die(f"Service (produto) com system_name={product_sn!r} não encontrado — sincronize o Product CR antes.")
        service_id = service["id"]

        # 4. Buscar o plano de aplicação
        status, plans_resp = api_request(admin_url, f"/admin/api/services/{service_id}/application_plans.json", token)
        if status != 200:
            die(f"Erro ao buscar planos: HTTP {status} - {plans_resp}")

        plan_rows = plans_resp.get("plans") or plans_resp.get("application_plans") or []
        plan = next((item.get("plan") or item.get("application_plan") for item in plan_rows
                     if (item.get("plan") or item.get("application_plan")).get("system_name") == plan_sn), None)

        if not plan:
            die(f"Plano de aplicação com system_name={plan_sn!r} não encontrado para o service id={service_id}")
        plan_id = plan["id"]

        psid = plan.get("service_id")
        if psid is not None and int(psid) != int(service_id):
            die(f"Inconsistência: plano id={plan_id} tem service_id={psid!r}, esperado {service_id!r}")

        # 5. Criar a aplicação
        print(
            f"Enviando POST para criar aplicação: account_id={account_id}, plan_id={plan_id} "
            f"(produto={product_sn!r}, plano={plan_sn!r})",
            file=sys.stderr,
        )

        payload = [
            ("plan_id", str(plan_id)),
            ("name", app_name),
            ("description", app_desc),
            ("application_id", client_id),
            ("application_key[]", client_secret),
        ]

        status, body = api_request(
            admin_url, f"/admin/api/accounts/{account_id}/applications.json", token, method="POST", payload=payload
        )

        if status in (200, 201):
            app = body.get("application", body) if isinstance(body, dict) else body
            validate_client_secret_matches_app(app, client_secret, allow_missing=True)
            print(json.dumps({"criado": True, "aplicacao": app}, indent=2, ensure_ascii=False))
            sys.exit(0)

        die(f"Falha ao criar aplicação — HTTP {status}: {body!r}", 2)

    if __name__ == "__main__":
        main()
