# Habilita o User Workload Monitoring (UWM) no OpenShift.
# O UWM provisiona um Prometheus dedicado (prometheus-user-workload) no namespace
# openshift-user-workload-monitoring, que descobre automaticamente ServiceMonitors
# e PodMonitors em todos os namespaces de usuário (incluindo 3scale-gitops).
#
# IMPORTANTE: Este ConfigMap é aplicado em 'openshift-monitoring', não em '3scale-gitops'.
# O Argo CD respeita o campo 'namespace' do manifesto e aplica no namespace correto,
# desde que o ServiceAccount openshift-gitops tenha permissão de escrita em openshift-monitoring.
#
# Verificar após o sync:
#   oc -n openshift-user-workload-monitoring get pods
# Esperado: prometheus-user-workload-0, thanos-ruler-user-workload-0 em Running.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-monitoring-config
  namespace: openshift-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
data:
  config.yaml: |
    enableUserWorkload: true
---
# Configura o Prometheus UWM do cluster PRIMÁRIO com external_labels.
# O label site=primary identifica a origem das séries ao consolidar métricas no Grafana.
#
# NÃO use a chave "cluster" — é reservada pelo validador do Cluster Monitoring Operator.
# NÃO use "instance" — conflita com o label nativo "instance" de cada target no Prometheus
# (host:port) e pode distorcer consultas/agregações no Grafana.
#
# NOTA: O namespace openshift-user-workload-monitoring só existe após o UWM ser habilitado
# (ConfigMap acima). Na primeira execução deste Application o sync pode falhar para este
# recurso. Execute o sync novamente após o UWM estar ativo (pods Running).
# A annotation SkipDryRunOnMissingResource evita erro de validação quando o namespace
# ainda não existe.
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-workload-monitoring-config
  namespace: openshift-user-workload-monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
data:
  config.yaml: |
    prometheus:
      externalLabels:
        site: primary
