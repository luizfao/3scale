# GrafanaDatasource — métricas via Thanos Querier (OpenShift Monitoring)
#
# IMPORTANTE (OCP 4.12+): o Service prometheus-user-workload:9091 expõe apenas o
# endpoint /metrics (uso interno). Chamadas como /api/v1/query nesse host:porta
# retornam HTTP 404 — por isso o Grafana não consegue usar "Save & test" contra
# prometheus-user-workload diretamente.
#
# O Thanos Querier (openshift-monitoring:9091) agrega o Prometheus de infra e o
# de user-workload e expõe a API PromQL completa. O mesmo token SA com
# cluster-monitoring-view funciona.
#
# valuesFrom: targetPath deve apontar para o campo onde está o placeholder ${token}
# (nome da chave no Secret). targetPath "prometheusToken" NÃO funciona — o operador
# só substitui em caminhos JSON existentes (ver código do grafana-operator).
#
# Referência (annotations do Service): oc -n openshift-user-workload-monitoring
#   get svc prometheus-user-workload -o yaml
# oc -n openshift-monitoring get svc thanos-querier -o yaml
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-user-workload
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-sa-token
          key: token
  datasource:
    name: Prometheus Primary
    type: prometheus
    access: proxy
    url: https://thanos-querier.openshift-monitoring.svc:9091
    isDefault: true
    jsonData:
      tlsSkipVerify: true
      timeInterval: 30s
      httpMethod: POST
      httpHeaderName1: "Authorization"
    secureJsonData:
      httpHeaderValue1: "Bearer ${token}"
