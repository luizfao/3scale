# Redis for 3scale Backend (queues + storage) - required in 2.16
# GitOps version based on 3scale migration guide for external Redis deployments.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-redis-external
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: backend-redis-external
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-redis-storage-external
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: backend-redis-external
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ocs-external-storagecluster-cephfs
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
---
apiVersion: v1
kind: Service
metadata:
  # Kept as backend-redis to preserve existing secret URLs in 3scale-gitops
  name: backend-redis
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app: backend-redis-external
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    deployment: backend-redis-external
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-redis-external
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: backend-redis-external
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      deployment: backend-redis-external
  template:
    metadata:
      labels:
        deployment: backend-redis-external
    spec:
      serviceAccountName: backend-redis-external
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend-redis-external
          image: registry.redhat.io/rhel9/redis-7
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_CONF
              value: /etc/redis.d/redis.conf
          ports:
            - containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - container-entrypoint
                - bash
                - -c
                - redis-cli set liveness-probe "`date`" | grep OK
            initialDelaySeconds: 10
            timeoutSeconds: 1
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            timeoutSeconds: 1
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "250m"
              memory: 256Mi
          volumeMounts:
            - name: backend-redis-storage-external
              mountPath: /var/lib/redis/data
            - name: redis-config-external
              mountPath: /etc/redis.d/
      volumes:
        - name: backend-redis-storage-external
          persistentVolumeClaim:
            claimName: backend-redis-storage-external
        - name: redis-config-external
          configMap:
            name: redis-config-external
            items:
              - key: redis.conf
                path: redis.conf
