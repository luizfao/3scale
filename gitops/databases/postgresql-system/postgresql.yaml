# PostgreSQL for 3scale System component (required in 2.16)
# Database name must be system_production for Rails.
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-system
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque
stringData:
  database: system_production
  username: threescale
  password: change-me
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-system
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: postgresql-system
spec:
  selector:
    app.kubernetes.io/name: postgresql-system
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql-system-headless
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: postgresql-system
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgresql-system
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-system
  namespace: 3scale-databases
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: postgresql-system
spec:
  replicas: 1
  serviceName: postgresql-system-headless
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql-system
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql-system
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgresql-system
                  key: database
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-system
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-system
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - pg_isready -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - pg_isready -h 127.0.0.1 -p 5432
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
