# Secrets required by 3scale operator when using external DBs (2.16).
# Zync DB is operator-managed (internal), so no external zync secret is used.
# See: https://docs.redhat.com/en/documentation/red_hat_3scale_api_management/2.16/html/installing_red_hat_3scale_api_management/
---
apiVersion: v1
kind: Secret
metadata:
  name: system-database
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  # Same user/password as in postgresql-system secret; database: system_production
  URL: "postgresql://threescale:change-me@postgresql-system.3scale-databases.svc.cluster.local:5432/system_production"
---
apiVersion: v1
kind: Secret
metadata:
  name: system-redis
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  URL: "redis://system-redis.3scale-databases.svc.cluster.local:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-redis
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  # Storage and queues use logical DBs 0 and 1 on the same Redis
  REDIS_STORAGE_URL: "redis://backend-redis.3scale-databases.svc.cluster.local:6379/0"
  REDIS_QUEUES_URL: "redis://backend-redis.3scale-databases.svc.cluster.local:6379/1"
