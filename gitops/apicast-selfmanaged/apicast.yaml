# APIcast Self-Managed — HA ativo-passivo
#
# Um único par de pods APIcast (production + staging) serve todos os produtos.
# Cada produto recebe um hostname distinto para evitar conflito de host no APIcast:
#
#   echoapi-product (user_key):
#     production → api.example.com
#     staging    → api-staging.example.com
#
#   echoapi-product-oidc (OIDC):
#     production → api-oidc.example.com
#     staging    → api-oidc-staging.example.com
#
#   echoapi-product-rhbk-auth (anonymous + token_introspection):
#     production → api-rhbk.example.com
#     staging    → api-rhbk-staging.example.com
#
# O APIcast CR cria o Route somente para o primeiro hostname de cada pod.
# Routes adicionais para os demais produtos são gerenciados manualmente neste arquivo
# (ao final) e apontam para os mesmos serviços criados pelo APIcast CR.
#
# ANTES DE SINCRONIZAR:
#   Substitua *.example.com pelas URLs independentes reais apontadas via DNS/LB externo.
#   Atualize também spec.deployment.apicastSelfManaged nos Products em gitops/echoapi/.
#
# Após sincronizar: execute ProxyConfigPromote para ambos os produtos.
---
# Secret com o endpoint do portal 3scale + access token para os APIcast buscar a configuração.
# O token é o mesmo utilizado para acessar o Admin Portal via API.
# Populado automaticamente pelo PreSync Job em gitops/apicast-selfmanaged/apicast-secret-init.yaml
# antes de cada sync do Application '3scale-apicast-selfmanaged'. Não edite manualmente.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: apicast-ha-portal-credentials
#   namespace: 3scale-gitops
#   annotations:
#     argocd.argoproj.io/sync-wave: "-1"
# type: Opaque
# stringData:
#   AdminPortalURL: "https://CHANGE_ME_ADMIN_ACCESS_TOKEN@3scale-admin.apps.cluster-zrdcz.dynamic.redhatworkshops.io"
---
# APIcast de produção — responde na URL independente gerenciada pelo LB externo.
# deploymentEnvironment: production usa configuração em cache (boot-loaded),
# adequado para tráfego real com menor latência.
apiVersion: apps.3scale.net/v1alpha1
kind: APIcast
metadata:
  name: apicast-ha-production
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  adminPortalCredentialsRef:
    name: apicast-ha-portal-credentials
  deploymentEnvironment: production
  logLevel: debug
  exposedHost:
    host: api.example.com   # substitua pela URL independente de produção
---
# APIcast de staging — pode usar URL independente de staging ou wildcard do cluster.
# deploymentEnvironment: staging faz validação em tempo real contra o 3scale backend.
apiVersion: apps.3scale.net/v1alpha1
kind: APIcast
metadata:
  name: apicast-ha-staging
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  adminPortalCredentialsRef:
    name: apicast-ha-portal-credentials
  deploymentEnvironment: staging
  logLevel: debug
  oidcLogLevel: debug
  exposedHost:
    host: api-staging.example.com   # substitua pela URL independente de staging
---
# Routes adicionais para echoapi-product-oidc.
# Apontam para os mesmos serviços criados pelo APIcast CR, com hostnames distintos
# para que o APIcast possa diferenciar os dois produtos pelo Host header.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: apicast-ha-production-oidc
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: api-oidc.example.com   # substitua pela URL independente de produção OIDC
  to:
    kind: Service
    name: apicast-apicast-ha-production
  port:
    targetPort: proxy
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: apicast-ha-staging-oidc
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: api-oidc-staging.example.com   # substitua pela URL independente de staging OIDC
  to:
    kind: Service
    name: apicast-apicast-ha-staging
  port:
    targetPort: proxy
---
# Routes para echoapi-product-rhbk-auth (Anonymous + Token Introspection).
# Mesmo padrão dos routes OIDC — apontam para os mesmos serviços APIcast HA.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: apicast-ha-production-rhbk
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: api-rhbk.example.com   # substitua pela URL independente de produção RHBK Auth
  to:
    kind: Service
    name: apicast-apicast-ha-production
  port:
    targetPort: proxy
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: apicast-ha-staging-rhbk
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  host: api-rhbk-staging.example.com   # substitua pela URL independente de staging RHBK Auth
  to:
    kind: Service
    name: apicast-apicast-ha-staging
  port:
    targetPort: proxy
