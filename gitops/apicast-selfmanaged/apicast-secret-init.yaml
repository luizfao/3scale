# PreSync hook — popula automaticamente a Secret apicast-ha-portal-credentials
#
# Executa ANTES de cada sync do Application '3scale-apicast-selfmanaged' nos dois clusters
# (primário e HA). Funciona de forma genérica: lê o token e o hostname do Admin Portal
# diretamente do cluster, sem nenhum valor hardcoded.
#
# Ordem de execução dentro da fase PreSync (sync-wave):
#   wave 1 → ServiceAccount + Role + RoleBinding (RBAC necessário para o Job)
#   wave 2 → Job (lê system-seed + route, cria/atualiza a Secret)
#
# O Job é deletado automaticamente após sucesso (HookSucceeded).
# Em caso de falha, consulte os logs:
#   oc -n 3scale-gitops logs job/apicast-portal-secret-init
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apicast-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apicast-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["system-seed"]
    verbs: ["get"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["apicast-ha-portal-credentials"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apicast-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apicast-secret-init
subjects:
  - kind: ServiceAccount
    name: apicast-secret-init
    namespace: 3scale-gitops
---
apiVersion: batch/v1
kind: Job
metadata:
  name: apicast-portal-secret-init
  namespace: 3scale-gitops
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: apicast-secret-init
      restartPolicy: OnFailure
      containers:
        - name: init
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              TOKEN=$(oc -n 3scale-gitops get secret system-seed \
                -o jsonpath='{.data.ADMIN_ACCESS_TOKEN}' | base64 -d)
              HOST=$(oc -n 3scale-gitops get route \
                -l zync.3scale.net/route-to=system-provider \
                -o jsonpath='{.items[0].spec.host}')
              if [ -z "${TOKEN}" ] || [ -z "${HOST}" ]; then
                echo "ERROR: could not read TOKEN or HOST from cluster"
                exit 1
              fi
              echo "Updating apicast-ha-portal-credentials for host: ${HOST}"
              oc -n 3scale-gitops create secret generic apicast-ha-portal-credentials \
                --from-literal=AdminPortalURL="https://${TOKEN}@${HOST}" \
                --dry-run=client -o yaml | oc apply -f -
              echo "Done."
