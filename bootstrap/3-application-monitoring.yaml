# Argo CD Application — Monitoramento 3scale (Grafana + UWM)
#
# Gerencia a configuração de monitoramento do 3scale:
#   - Habilitação do OpenShift User Workload Monitoring (UWM) em openshift-monitoring
#   - RBAC do ServiceAccount Grafana (acesso ao Prometheus UWM)
#   - Grafana CR (instância Grafana com Route OpenShift)
#   - GrafanaDatasource "Prometheus Primary" (UWM local)
#   - ServiceMonitor para os pods APIcast Self-Managed
#
# O arquivo grafana-datasource-ha.yaml está EXCLUÍDO do sync por padrão: ele só deve ser
# aplicado após o cluster HA estar ativo, com URL real do Route e Secret grafana-ha-sa-token.
# Para consolidar o HA, remova a linha "exclude" abaixo (ou aplique esse manifest manualmente).
#
# Aplicado ANTES do APIManager (4-application-apimanager.yaml) para garantir que o
# Prometheus UWM já esteja ativo quando o operador 3scale criar os ServiceMonitors.
#
# PRÉ-REQUISITO: Aprovar o InstallPlan do Grafana Operator após o sync de 3scale-operator:
#   oc -n 3scale-gitops get installplans
#   oc -n 3scale-gitops patch installplan <nome> -p '{"spec":{"approved":true}}' --type=merge
#
# Aplicar somente no cluster PRIMÁRIO (Grafana fica aqui):
#   oc apply -f bootstrap/3-application-monitoring.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 3scale-monitoring
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/luizfao/3scale.git
    targetRevision: bcb52
    path: gitops/monitoring
    directory:
      recurse: true
      exclude: grafana-datasource-ha.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: 3scale-gitops
  syncPolicy: {}
