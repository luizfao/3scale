# Argo CD Application — APIcast Self-Managed (cluster primário e HA)
#
# Gerencia os APIcast CRs de produção e staging com URL independente do cluster.
#
# ATENÇÃO: Preencha a Secret apicast-ha-portal-credentials ANTES de sincronizar.
# Consulte gitops/apicast-selfmanaged/apicast.yaml para os passos necessários.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 3scale-apicast-selfmanaged
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/luizfao/3scale.git
    targetRevision: bcb52
    path: gitops/apicast-selfmanaged
  destination:
    server: https://kubernetes.default.svc
    namespace: 3scale-gitops
  syncPolicy: {}
