apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 3scale-databases
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/luizfao/3scale.git
    targetRevision: main
    path: gitops/databases
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: 3scale-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
