apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 3scale-echoapi
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/luizfao/3scale.git
    targetRevision: main
    path: gitops/echoapi
    directory:
      recurse: true
      # Exclui todos os arquivos do diretório echoapi para fazer limpeza
#      exclude: '{*.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: 3scale-gitops
  syncPolicy: 
  automated: {}
#    prune: true
#    selfHeal: false
