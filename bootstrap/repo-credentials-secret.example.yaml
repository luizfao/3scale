# Copy to repo-credentials-secret.yaml and set password to your GitHub PAT.
# Do not commit repo-credentials-secret.yaml (see .gitignore).
apiVersion: v1
kind: Secret
metadata:
  name: repo-3scale
  namespace: openshift-gitops
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://github.com/USER/3scale.git
  username: x-access-token
  password: "<GITHUB_TOKEN>"
